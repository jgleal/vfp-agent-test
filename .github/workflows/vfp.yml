name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # /vfp-check: verify secrets are configured and post a comment
  check:
    if: startsWith(github.event.comment.body, '/vfp-check')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check secrets
        uses: actions/github-script@v7
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        with:
          script: |
            const google = process.env.GOOGLE_GENERATIVE_AI_API_KEY ? 'set' : 'MISSING';
            const notion = process.env.NOTION_TOKEN ? 'set' : 'MISSING';
            const ready = process.env.GOOGLE_GENERATIVE_AI_API_KEY && process.env.NOTION_TOKEN;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## VFP Agent - secrets check',
                '',
                '- GOOGLE_GENERATIVE_AI_API_KEY: ' + google,
                '- NOTION_TOKEN: ' + notion,
                '',
                ready
                  ? 'Ready. Comment /vfp on any issue to generate a VFP.'
                  : 'Not ready. Add the missing secrets in repo Settings > Secrets > Actions.'
              ].join('\n')
            });

  # /vfp: generate a VFP for the issue using the specialised agent
  vfp:
    if: |
      startsWith(github.event.comment.body, '/vfp') &&
      !startsWith(github.event.comment.body, '/vfp-check')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run VFP agent
        uses: anomalyco/opencode/github@latest
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          PARENT_PAGE_ID: ${{ secrets.PARENT_PAGE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: google/gemini-2.0-flash
          agent: vfp
          share: "false"
          mentions: "/vfp"
          use_github_token: "true"
          prompt: |
            Your first action — before generating any VFP content — is to run this Python3 script via bash to locate the Notion parent page:

            python3 - <<'EOF'
            import urllib.request, json, os, sys
            TOKEN = os.environ.get('NOTION_TOKEN', '')
            if not TOKEN: sys.exit('ERROR: NOTION_TOKEN is not set')
            headers = {'Authorization': f'Bearer {TOKEN}', 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28'}
            for q in ['VFPs', 'VFP', 'Value Framing']:
                req = urllib.request.Request('https://api.notion.com/v1/search',
                    json.dumps({'query': q, 'filter': {'property': 'object', 'value': 'page'}}).encode(),
                    headers, method='POST')
                results = json.loads(urllib.request.urlopen(req).read()).get('results', [])
                if results: print(results[0]['id']); sys.exit(0)
            sys.exit('ERROR: no VFPs/VFP/Value Framing page found')
            EOF

            Record the printed ID as PARENT_PAGE_ID. If the script exits with an error, stop and report it.

            Then generate a Value Framing Packet (VFP) for the delivery request in this issue. The VFP must use exactly these 17 sections in this order: §4.1 Request Summary, §4.2 Intended Outcome, §4.3 Expected User Behaviour, §4.4 Expected Value, §4.5 Known Facts, §4.6 Assumptions, §4.7 Ambiguities & Undefined Areas, §4.8 Scope Boundaries, §4.9 Risk & Uncertainty Signals, §4.10 Proposed Agreement Boundary, §4.11 Suggested Capability Slices, §4.12 Validation Signals, §4.13 Evidence Expectations, §4.14 Prototype or Mock Validation, §4.15 Delivery Handoff Notes, §4.16 Questions for Stakeholders, §4.17 Recommended Next Step. Do NOT generate a product spec, user stories, or PRD-style sections.

            Then publish to Notion using Python3 urllib — two calls: POST /v1/pages with Notion-Version: 2022-06-28 to create the page, then PATCH /v1/pages/{id}/markdown with Notion-Version: 2026-03-11 and {"replace_content": "..."} to write the VFP content. Use ### headings for each section. NOTION_TOKEN is in your environment. If the script fails, post the full VFP as a GitHub comment and state it is in Draft state pending Notion publish.

            Then post a GitHub comment on this issue using exactly this structure:
            ## VFP Published
            [2-3 sentence behavioural reframe from §4.1]
            **Main risk signals**
            - **[type]**: [one sentence]
            - **[type]**: [one sentence]
            **Recommended next step**
            [1-2 sentences from §4.17]
            ---
            📄 Full Value Framing Packet: [notion url]

  # /oc or /opencode: general-purpose opencode agent
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: google/gemini-2.0-flash
          share: "false"
          use_github_token: "true"
